<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/contact.css">
    <title>Kontakt</title>
</head>
<body>
    <header>
        <div id="header-left"><a href="index.html"><img src="./assets/MF-Logo.svg" alt="Logo von Fabian Müller" id="logo"></a></div>
        <div id="header-center"><h1 id="header-titel">Fabian Müller</h1></div>
        <div id="header-right"><a href="navigation.html"><img src="./assets/burger-menu.svg" alt="Burger Menu" id="menu-button"></a></div>
    </header>
    <nav>
        <a href="index.html" class="nav-link"><div class="nav-button">
            <p class="nav-text">Über mich</p>
        </div></a>
        <a href="skills.html" class="nav-link"><div class="nav-button">
            <p class="nav-text">Fähigkeiten</p>
        </div></a>
        <a href="portfolio.html" class="nav-link"><div class="nav-button">
            <p class="nav-text">Portfolio</p>
        </div></a>
        <a href="contact.html" class="nav-link"><div class="nav-button nav-button-current">
            <p class="nav-text nav-text-current">Kontakt</p>
        </div></a>
    </nav>
    <main>
        <h2>Kontakt</h2>
        <div id="contact-container">
            <div id="contact-item-information">
                <div id="contact-informationen">
                    <label>
                        Vorname
                        <p>Fabian</p>
                    </label>
                    <label>
                        Nachname
                        <p>Müller</p>
                    </label>
                    <label>
                        Schul E-Mail
                        <p><a href="mailto:fabian.mueller2@edu.gbssg.ch">fabian.mueller2@edu.gbssg.ch</a></p>
                    </label>
                    <label>
                        Schul Adresse
                        <p>GBS St.Gallen</p>
                        <p>Demutstrasse 115</p>
                        <p>9012 St. Gallen</p>
                        <p>Schweiz</p>
                    </label>
                </div>
            </div>
            <div id="contact-item-formular">
                <div id="contact-formular">
                    <form>
                        <input type="text" id="input-vorname" placeholder="Vorname" required>
                        <input type="text" id="input-nachname" placeholder="Nachname" required>
                        <input type="email" id="input-email" placeholder="E-Mail" required>
                        <input type="text" id="input-betreff" placeholder="Betreff" required>
                        <textarea id="input-nachricht" placeholder="Nachricht" required></textarea>
                        <button type="button" id="btn-senden">Senden</button>
                    </form>
                </div>
            </div>
        </div>
    </main>
    <script>
        document.getElementById('btn-senden').addEventListener('click', function()
        {
            const vorname = document.getElementById('input-vorname').value;
            const nachname = document.getElementById('input-nachname').value;
            const email = document.getElementById('input-email').value;
            const betreff = document.getElementById('input-betreff').value;
            const nachricht = document.getElementById('input-nachricht').value;

            const body = `${nachricht}\n\n${vorname} ${nachname}\n${email}`;
            const mailto = `mailto:fabian.mueller2@edu.gbssg.ch?subject=${encodeURIComponent(betreff)}&body=${encodeURIComponent(body)}`;

            window.location.href = mailto;
            document.getElementById('btn-senden').closest('form').reset();
        });
    </script>
</body>
</html>
